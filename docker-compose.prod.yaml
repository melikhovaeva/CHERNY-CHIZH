services:
  nginx:
    build:
      context: .
      dockerfile: infra/nginx/Dockerfile
    ports:
      - "80:80"
    volumes:
      - static_files:/app/static:ro
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - .env.prod
    volumes:
      - static_files:/backend-app/staticfiles
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; socket.create_connection(('localhost', 8000), timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    command: ["/bin/sh", "/backend-app/entrypoint.prod.sh"]
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    restart: unless-stopped

  postgres:
    image: postgres:17.4-alpine3.21
    env_file:
      - .env.prod
    environment:
      - POSTGRES_USER=postgres
    volumes:
      - ./docker/postgres/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
      - postgres_data:/var/lib/postgresql/data
    container_name: postgres
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    env_file:
      - .env.prod
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9090"
    restart: unless-stopped

volumes:
  static_files:
  postgres_data:
  minio_data:
networks:
  app-network:
