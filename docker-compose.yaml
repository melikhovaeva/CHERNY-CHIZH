services:
  frontend-user:
    platform: linux/amd64
    build:
      context: ./frontend
      dockerfile: Dockerfile
    volumes:
      - ./frontend:/frontend-app
    environment:
      - NODE_ENV=development
    command: sh -c "yarn install && yarn workspace user-app docker:dev"
  frontend-admin:
    platform: linux/amd64
    build:
      context: ./frontend
      dockerfile: Dockerfile
    volumes:
      - ./frontend:/frontend-app
    environment:
      - NODE_ENV=development
    command: sh -c "yarn install && yarn workspace admin-app docker:dev"
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - 8000:8000
    volumes:
      - ./backend:/backend-app
    env_file:
      - .env
    command: sh -c "pip install -r requirements.txt && python manage.py runserver 0.0.0.0:8000"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
  postgres:
    image: postgres:17.4-alpine3.21
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
    volumes:
      - ./docker/postgres/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    container_name: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    ports:
      - "5432:5432"
  minio:
    image: minio/minio:latest
    ports:
      - 9000:9000
    volumes:
      - ./docker/minio/data:/data
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9090"
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    depends_on:
      - frontend-user
      - frontend-admin
    ports:
      - "3000:80"
    volumes:
      - ./infra/nginx/dev.conf:/etc/nginx/nginx.conf:ro
    restart: unless-stopped
