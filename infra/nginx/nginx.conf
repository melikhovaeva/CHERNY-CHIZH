worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;
    client_max_body_size 50M;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 1024;

    upstream backend {
        server backend:8000;
    }

    upstream minio {
        server minio:9000;
    }

    server {
        listen 443 ssl;
        server_name dogpitomnik.ru;

        ssl_certificate     /etc/letsencrypt/live/dogpitomnik.ru/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/dogpitomnik.ru/privkey.pem;

        root /usr/share/nginx/html;
        index index.html;

        # Django static files
        location ^~ /static/ {
            alias /app/static/;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # MinIO media files — ^~ prevents regex locations from matching
        location ^~ /ch-ch-bucket/ {
            proxy_pass http://minio/ch-ch-bucket/;
            proxy_set_header Host minio:9000;
            expires 7d;
            add_header Cache-Control "public";
        }

        # Django API
        location /api/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Django admin
        location /admin/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # drf-spectacular schema
        location /schema/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # React SPA — everything else
        location / {
            try_files $uri $uri/ /index.html;
            expires -1;
            add_header Cache-Control "no-store";
        }

        # Frontend assets with content hash — long cache
        location ~* \.(js|css|woff2?|ttf|eot|otf|png|jpg|jpeg|gif|ico|svg|webp)$ {
            try_files $uri =404;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
}
